name: "Reusable Windows Build"

on:
  workflow_call:
    inputs:
      create-setup:
        description: 'Whether to create NSIS setup installer'
        required: false
        type: boolean
        default: false
      build-type:
        description: 'Build type (Debug or Release)'
        required: false
        type: string
        default: 'Release'

jobs:
  buildWindows:
    runs-on: windows-2025-vs2026
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup CMake 4.2+
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: '~4.2.0'
        ninjaVersion: 'latest'

    - run: mkdir ${{github.workspace}}/build

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure CMake
      run: cmake -G "Visual Studio 18 2026" -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{inputs.build-type}}

    - name: Build kwxFFI
      run: cmake --build ${{github.workspace}}/build --config ${{inputs.build-type}} --parallel 2 --target kwxFFI

    # Remove NSIS installer steps

    - name: Publish kwxFFI DLL and import libs
      uses: actions/upload-artifact@v5
      with:
        name: kwxFFI-Windows-Release
        path: |
          lib/Release/kwxFFI.dll
          lib/Release/kwxFFI.exp
          lib/Release/kwxFFI.lib
